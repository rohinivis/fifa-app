# Requires the metrics-server addon to be running in the cluster.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fut-club-app
  namespace: fut-club
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fut-club-app
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
