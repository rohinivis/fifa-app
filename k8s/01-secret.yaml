# Do NOT commit real secrets to git. This is a template.
# Create it for real with:
#   kubectl create secret generic fut-club-secrets \
#     --namespace fut-club \
#     --from-literal=POSTGRES_USER=postgres \
#     --from-literal=POSTGRES_PASSWORD=change-me \
#     --from-literal=POSTGRES_DB=fut_club \
#     --from-literal=SESSION_SECRET=change-me-too \
#     --from-literal=DATABASE_URL=postgres://postgres:change-me@postgres:5432/fut_club
#
# Or edit the stringData values below and `kubectl apply -f 01-secret.yaml`.
# NOTE: "postgres" in DATABASE_URL is the Postgres Service name from 10-postgres.yaml.
# If you change POSTGRES_USER/PASSWORD/DB below, update DATABASE_URL to match.
apiVersion: v1
kind: Secret
metadata:
  name: fut-club-secrets
  namespace: fut-club
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: change-me
  POSTGRES_DB: fut_club
  SESSION_SECRET: change-me-too
  DATABASE_URL: postgres://postgres:change-me@postgres:5432/fut_club
