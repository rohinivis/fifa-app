apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: fut-club-app

build:
  artifacts:
    - image: rviswanatham1/fut-club-app
      docker:
        dockerfile: Dockerfile
        target: dev
      sync:
        manual:
          - src: "website/views/**/*.js"
            dest: /app
          - src: "website/components/**/*.js"
            dest: /app
          - src: "website/public/**/*"
            dest: /app
          - src: "website/routes/**/*.js"
            dest: /app
          - src: "website/functions/**/*.js"
            dest: /app
          - src: "init/**/*.js"
            dest: /app
          - src: "migrations/**/*"
            dest: /app
  local:
    push: false # kind/minikube/Docker Desktop k8s all use the local image directly

manifests:
  rawYaml:
    - k8s/00-namespace.yaml
    - k8s/01-secret.yaml
    - k8s/02-configmap.yaml
    - k8s/03-db-init-configmap.yaml
    - k8s/10-postgres.yaml
    - k8s/20-app.yaml
deploy:
  kubectl: {}

portForward:
  - resourceType: service
    resourceName: fut-club-app
    namespace: fut-club
    port: 80
    localPort: 8080
